name: Security checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-only-7f1c9d2e4a6b8c0d3e5f7a9b1c2d4e6f8a0b3c5d7e9f
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,testserver
      DJANGO_SECURE_SSL_REDIRECT: "0"
      DJANGO_SESSION_COOKIE_SECURE: "1"
      DJANGO_CSRF_COOKIE_SECURE: "1"
      DJANGO_HSTS_SECONDS: "31536000"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: web_app/requirements.txt

      - name: Install application and audit tools
        run: |
          python -m pip install --require-hashes -r web_app/requirements.txt
          python -m pip install bandit pip-audit

      - name: Build production static assets
        working-directory: web_app
        run: python manage.py collectstatic --noinput

      - name: Run Django tests
        working-directory: web_app
        run: python manage.py test

      - name: Validate production configuration
        working-directory: web_app
        run: python manage.py check --deploy --fail-level WARNING

      - name: Static security analysis
        run: bandit -r web_app src Tripadvisor_web_scraper -x Tripadvisor_web_scraper/venv -ll

      - name: Audit deployed dependencies
        run: pip-audit -r web_app/requirements.txt --disable-pip

      - name: Reject common committed secret formats
        run: |
          if git grep -I -E '(AIza[0-9A-Za-z_-]{20,}|AKIA[0-9A-Z]{16}|gh[pousr]_[A-Za-z0-9_]{20,}|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY)' -- ':!.env.example'; then
            echo 'Potential committed secret detected.' >&2
            exit 1
          fi
